    <style>
      .photogrammetry-related {
        margin-bottom: clamp(28px, 5vw, 72px);
      }

      .photogrammetry-related__label {
        margin: 0 0 14px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .photogrammetry-related__card {
        position: relative;
        display: block;
        min-height: clamp(300px, 48vw, 680px);
        overflow: hidden;
        color: #ffffff;
        background: #111212;
      }

      .photogrammetry-related__card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 42%;
        transition: filter 220ms ease, transform 320ms ease;
      }

      .photogrammetry-related__card::after {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.72));
        content: "";
      }

      .photogrammetry-related__text {
        position: absolute;
        z-index: 1;
        right: clamp(18px, 4vw, 54px);
        bottom: clamp(18px, 4vw, 48px);
        left: clamp(18px, 4vw, 54px);
      }

      .photogrammetry-related__text h2 {
        margin: 0 0 6px;
        color: #ffffff;
        font-size: clamp(1.8rem, 5vw, 4.8rem);
        font-weight: 400;
      }

      .photogrammetry-related__text p {
        margin: 0;
        color: rgba(255, 255, 255, 0.75);
        font-size: clamp(0.86rem, 1.5vw, 1.05rem);
      }

      .photogrammetry-related__card:hover {
        color: #ffffff;
        text-decoration: none;
      }

      .photogrammetry-related__card:hover img,
      .photogrammetry-related__card:focus img {
        filter: brightness(1.08);
        transform: scale(1.025);
      }

      @media (max-width: 575.98px) {
        .photogrammetry-related__card {
          min-height: 72vw;
        }
      }
    </style>
  </head>
