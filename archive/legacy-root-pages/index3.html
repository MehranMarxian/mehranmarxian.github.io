<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mehran Ahmadi</title>
    <link href="css/bootstrap-4.4.1.css" rel="stylesheet">
  <style>
      @import url("webfonts/PTSans_Regular/stylesheet.css");

      /* Fullscreen slideshow background */
      body, html {
        height: 100%;
        margin: 0;
        font-family: 'PTSans Regular', sans-serif;
      }

      .slideshow-container {
        position: relative;
        height: 100vh;
        overflow: hidden;
      }

      .slideshow-container img {
        position: absolute;
        width: 100%;
        height: 100vh;
        object-fit: cover;
        opacity: 0;
        transition: slide 1s ease-in-out;
      }

      .slideshow-container img.active {
        opacity: 1;
      }

      /* Centered content */
      .centered-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
      }

      .centered-content h2 {
        font-size: 40px;
        margin-bottom: 20px;
        color: #7E7E7E;
      }

      .enter-btn {
        padding: 15px 30px;
        background-color: black;
        color: white;
        border: none;
        font-size: 28px;
        cursor: pointer;
        margin-top: 20px;
      }

      .enter-btn:hover {
        background-color: lightgray;
      }

      /* Bottom-left small text */
      .footer-text {
        position: absolute;
        bottom: 10px;
        left: 10px;
        color: white;
        font-size: 10px;
      }

      /* Preloader */
      #preloader {
        position: fixed;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 24px;
        font-family: 'PTSans Regular', sans-serif;
        z-index: 1000;
      }
    .copyright {
}
  </style>
</head>
<body>
    <!-- Preloader -->
    <div id="preloader">Loading...</div>

    <!-- Fullscreen slideshow background -->
    <div class="slideshow-container">
      <img src="images/mehran-ahmadi-photo-001.jpg" class="active" alt="Image 1">
      <img src="images/mehran-ahmadi-photo-006.jpg" alt="Image 2">
      <img src="images/mehran-ahmadi-photo-003.jpg" alt="Image 3">
      <img src="images/mehran-ahmadi-photo-0061.jpg" alt="Image 4">
      <img src="images/mehran-ahmadi-photo-012.jpg" alt="Image 5">
      <img src="images/mehran-ahmadi-photo-001.jpg" alt="Image 6">
    </div>

    <!-- Centered content -->
    <div class="centered-content">
<button class="enter-btn" onclick="location.href='home.html'">Enter</button>
<div id="quote-container">
<p id="quote"></p>
  <p id="author"></p>
</div>

    <!-- Footer text -->
    
    <!-- Scripts -->
    <script src="js/jquery-3.4.1.min.js"></script>
    <script src="js/bootstrap-4.4.1.js"></script>
    <script>
// Quotes and their authors
const quotes = [
  { text: "Art should comfort the disturbed and disturb the comfortable.", author: "Banksy" },
  { text: "Creativity takes courage.", author: "Henri Matisse" },
  { text: "Art is the lie that enables us to realize the truth.", author: "Pablo Picasso" },
  { text: "Every artist was first an amateur.", author: "Ralph Waldo Emerson" },
  { text: "Art is not what you see, but what you make others see.", author: "Edgar Degas" },
  { text: "The purpose of art is washing the dust of daily life off our souls.", author: "Pablo Picasso" }
];

// Display a random quote
const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
document.getElementById("quote").textContent = `"${randomQuote.text}"`;
document.getElementById("author").textContent = `– ${randomQuote.author}`;


      // Simple Slideshow Functionality
      let currentIndex = 0;
      const images = document.querySelectorAll(".slideshow-container img");

      function showNextImage() {
        images[currentIndex].classList.remove("active");
        currentIndex = (currentIndex + 1) % images.length;
        images[currentIndex].classList.add("active");
      }

      setInterval(showNextImage, 3000); // Change image every 3 seconds

      // Preloader logic
      window.addEventListener("load", function() {
        document.getElementById("preloader").style.display = "none";
      });
    </script>
<div class="footer-text copyright">All Rights Reserved | Mehran Ahmadi | 2024</div>
</body>
</html>
