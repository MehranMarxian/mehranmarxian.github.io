<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Mehran Ahmadi is a visual artist working with photography, AI-generated imagery, and conceptual surreal visuals."
    />
    <title>Mehran Ahmadi | Visual Artist</title>
    <link href="css/site.css" rel="stylesheet" />
  </head>
  <body>
    <main class="slideshow-container" aria-label="Selected works by Mehran Ahmadi">
      <img
        src="Images/home/mehran-ahmadi-visual-artist-home-01.jpg"
        class="active"
        alt="Atmospheric photographic artwork by MEHRAN AHMADI"
        fetchpriority="high"
      />
      <img
        src="Images/home/mehran-ahmadi-visual-artist-home-02.jpg"
        alt="Surreal photographic artwork by MEHRAN AHMADI"
        loading="lazy"
      />
      <img
        src="Images/home/mehran-ahmadi-visual-artist-home-03.jpg"
        alt="Conceptual visual artwork by MEHRAN AHMADI"
        loading="lazy"
      />
      <img
        src="Images/home/mehran-ahmadi-visual-artist-home-04.jpg"
        alt="Low-light photographic artwork by MEHRAN AHMADI"
        loading="lazy"
      />
      <img
        src="Images/home/mehran-ahmadi-visual-artist-home-05.jpg"
        alt="Portrait-based visual artwork by MEHRAN AHMADI"
        loading="lazy"
      />
      <img
        src="Images/home/mehran-ahmadi-visual-artist-home-06.jpg"
        alt="Minimal photographic composition by MEHRAN AHMADI"
        loading="lazy"
      />

      <div class="centered-content">
        <button class="enter-btn" type="button" onclick="location.href = 'home.html'">
          Enter
        </button>
      </div>

      <p class="hero-footer-text">All Rights Reserved | Mehran Ahmadi | 2026</p>
    </main>

    <script>
      const images = document.querySelectorAll(".slideshow-container img");
      let currentIndex = 0;

      if (images.length > 1) {
        window.setInterval(() => {
          images[currentIndex].classList.remove("active");
          currentIndex = (currentIndex + 1) % images.length;
          images[currentIndex].classList.add("active");
        }, 3600);
      }
    </script>
  </body>
</html>
